<svg width="100%" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Transformation from traditional computing concepts to agentic equivalents">
  <style>
    .lbl    { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; }
    .sub    { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; }
    .col-hd { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #111827; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="col-hd" x="118" y="30" text-anchor="middle">Traditional</text>
  <text class="col-hd" x="553" y="30" text-anchor="middle">Agentic</text>
  <line x1="40" y1="42" x2="640" y2="42" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- row 1: CPU → LLM -->
  <rect x="40" y="54" width="155" height="50" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="0.5"/>
  <text class="lbl" x="118" y="74" text-anchor="middle" dominant-baseline="central" fill="#4c1d95">CPU</text>
  <text class="sub" x="118" y="92" text-anchor="middle" dominant-baseline="central" fill="#6d28d9">processes bytes</text>
  <line x1="198" y1="79" x2="215" y2="79" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="218" y="59" width="234" height="40" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.5"/>
  <text class="lbl" x="335" y="74" text-anchor="middle" dominant-baseline="central" fill="#111827">bytes → tokens</text>
  <text class="sub" x="335" y="91" text-anchor="middle" dominant-baseline="central" fill="#6b7280">deterministic → statistical</text>
  <line x1="455" y1="79" x2="472" y2="79" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="475" y="54" width="155" height="50" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="0.5"/>
  <text class="lbl" x="553" y="74" text-anchor="middle" dominant-baseline="central" fill="#4c1d95">LLM</text>
  <text class="sub" x="553" y="92" text-anchor="middle" dominant-baseline="central" fill="#6d28d9">processes tokens</text>

  <line x1="40" y1="120" x2="640" y2="120" stroke="#e5e7eb" stroke-width="0.5" opacity="0.6"/>

  <!-- row 2: Kernel → Agent -->
  <rect x="40" y="132" width="155" height="50" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="0.5"/>
  <text class="lbl" x="118" y="152" text-anchor="middle" dominant-baseline="central" fill="#134e4a">OS kernel</text>
  <text class="sub" x="118" y="170" text-anchor="middle" dominant-baseline="central" fill="#0f766e">routes instructions</text>
  <line x1="198" y1="157" x2="215" y2="157" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="218" y="137" width="234" height="40" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.5"/>
  <text class="lbl" x="335" y="152" text-anchor="middle" dominant-baseline="central" fill="#111827">syscalls → tool calls</text>
  <text class="sub" x="335" y="169" text-anchor="middle" dominant-baseline="central" fill="#6b7280">fixed ISA → extensible tools</text>
  <line x1="455" y1="157" x2="472" y2="157" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="475" y="132" width="155" height="50" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="0.5"/>
  <text class="lbl" x="553" y="152" text-anchor="middle" dominant-baseline="central" fill="#134e4a">Agent</text>
  <text class="sub" x="553" y="170" text-anchor="middle" dominant-baseline="central" fill="#0f766e">routes tool calls</text>

  <line x1="40" y1="198" x2="640" y2="198" stroke="#e5e7eb" stroke-width="0.5" opacity="0.6"/>

  <!-- row 3: OS → Harness -->
  <rect x="40" y="210" width="155" height="50" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="0.5"/>
  <text class="lbl" x="118" y="230" text-anchor="middle" dominant-baseline="central" fill="#1e3a8a">Operating system</text>
  <text class="sub" x="118" y="248" text-anchor="middle" dominant-baseline="central" fill="#1d4ed8">hardware interface</text>
  <line x1="198" y1="235" x2="215" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="218" y="215" width="234" height="40" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.5"/>
  <text class="lbl" x="335" y="230" text-anchor="middle" dominant-baseline="central" fill="#111827">HW API → model API</text>
  <text class="sub" x="335" y="247" text-anchor="middle" dominant-baseline="central" fill="#6b7280">binary config → language config</text>
  <line x1="455" y1="235" x2="472" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="475" y="210" width="155" height="50" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="0.5"/>
  <text class="lbl" x="553" y="230" text-anchor="middle" dominant-baseline="central" fill="#1e3a8a">Harness</text>
  <text class="sub" x="553" y="248" text-anchor="middle" dominant-baseline="central" fill="#1d4ed8">model interface</text>
</svg>