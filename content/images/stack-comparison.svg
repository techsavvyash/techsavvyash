<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Traditional computing vs agentic ecosystem stack comparison">
  <style>
    svg {
      --fg: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --eq: #6b7280;

      --purple-fill: #ede9fe;
      --purple-stroke: #7c3aed;
      --purple-text: #4c1d95;
      --purple-sub: #6d28d9;

      --teal-fill: #ccfbf1;
      --teal-stroke: #0d9488;
      --teal-text: #134e4a;
      --teal-sub: #0f766e;

      --blue-fill: #dbeafe;
      --blue-stroke: #2563eb;
      --blue-text: #1e3a8a;
      --blue-sub: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --border: #374151;
        --eq: #9ca3af;

        --purple-fill: #2e1065;
        --purple-stroke: #a78bfa;
        --purple-text: #ede9fe;
        --purple-sub: #c4b5fd;

        --teal-fill: #042f2e;
        --teal-stroke: #5eead4;
        --teal-text: #ccfbf1;
        --teal-sub: #99f6e4;

        --blue-fill: #172554;
        --blue-stroke: #93c5fd;
        --blue-text: #dbeafe;
        --blue-sub: #bfdbfe;
      }
    }
    .lbl    { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 600; }
    .sub    { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; }
    .eq     { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 500; fill: var(--eq); }
    .col-hd { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: var(--fg); }
  </style>

  <!-- column headers -->
  <text class="col-hd" x="150" y="32" text-anchor="middle">Traditional computing</text>
  <text class="col-hd" x="530" y="32" text-anchor="middle">Agentic ecosystem</text>
  <line x1="40" y1="44" x2="640" y2="44" stroke="var(--border)" stroke-width="1"/>

  <!-- row 1: CPU / LLM -->
  <rect x="40" y="60" width="220" height="56" rx="6" fill="var(--purple-fill)" stroke="var(--purple-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="150" y="83" text-anchor="middle" dominant-baseline="central" fill="var(--purple-text)">CPU</text>
  <text class="sub" x="150" y="101" text-anchor="middle" dominant-baseline="central" fill="var(--purple-sub)">bytes · deterministic</text>
  <text class="eq" x="340" y="92" text-anchor="middle" dominant-baseline="central">≡</text>
  <rect x="420" y="60" width="220" height="56" rx="6" fill="var(--purple-fill)" stroke="var(--purple-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="530" y="83" text-anchor="middle" dominant-baseline="central" fill="var(--purple-text)">LLM</text>
  <text class="sub" x="530" y="101" text-anchor="middle" dominant-baseline="central" fill="var(--purple-sub)">tokens · probabilistic</text>

  <!-- row 2: Kernel / Agent -->
  <rect x="40" y="136" width="220" height="56" rx="6" fill="var(--teal-fill)" stroke="var(--teal-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="150" y="159" text-anchor="middle" dominant-baseline="central" fill="var(--teal-text)">OS kernel</text>
  <text class="sub" x="150" y="177" text-anchor="middle" dominant-baseline="central" fill="var(--teal-sub)">orchestrates system calls</text>
  <text class="eq" x="340" y="168" text-anchor="middle" dominant-baseline="central">≡</text>
  <rect x="420" y="136" width="220" height="56" rx="6" fill="var(--teal-fill)" stroke="var(--teal-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="530" y="159" text-anchor="middle" dominant-baseline="central" fill="var(--teal-text)">Agent</text>
  <text class="sub" x="530" y="177" text-anchor="middle" dominant-baseline="central" fill="var(--teal-sub)">orchestrates tool calls</text>

  <!-- row 3: OS / Harness -->
  <rect x="40" y="212" width="220" height="56" rx="6" fill="var(--blue-fill)" stroke="var(--blue-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="150" y="235" text-anchor="middle" dominant-baseline="central" fill="var(--blue-text)">Operating system</text>
  <text class="sub" x="150" y="253" text-anchor="middle" dominant-baseline="central" fill="var(--blue-sub)">system API surface</text>
  <text class="eq" x="340" y="244" text-anchor="middle" dominant-baseline="central">≡</text>
  <rect x="420" y="212" width="220" height="56" rx="6" fill="var(--blue-fill)" stroke="var(--blue-stroke)" stroke-width="1.5"/>
  <text class="lbl" x="530" y="235" text-anchor="middle" dominant-baseline="central" fill="var(--blue-text)">Harness</text>
  <text class="sub" x="530" y="253" text-anchor="middle" dominant-baseline="central" fill="var(--blue-sub)">agent API surface</text>
</svg>
